spring:
  config:
    activate:
      on-profile: dev

portfolio:
  idempotency:
    store: ${IDEMPOTENCY_STORE:memory}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,configprops,beans
  endpoint:
    health:
      show-details: always
    env:
      show-values: always

logging:
  level:
    com.portfolio: DEBUG
